version: '3.9'

services:
  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - appnet

  api:
    ports: []
    expose:
      - "8000"
    networks:
      - appnet
