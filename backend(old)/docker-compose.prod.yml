services:

  arangodb:
    image: "arangodb:3.12.7.1"
    container_name: arangodb
    restart: always
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_PASSWORD:-rootpassword}
    ports:
      - "8529:8529"
    volumes:
      - arango_data:/var/lib/arangodb3
      - arango_apps_data:/var/lib/arangodb3-apps
    networks:
      - appnet

  redis:
    image: "redis:8.4.0-alpine"
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - appnet

  orion_agent:
    build:
      context: .
      dockerfile: ./agent/Dockerfile
    image: krstlcm/orion-agent:prod
    container_name: orion_agent
    restart: always
    volumes:
      - ai_config_data:/app/config/shared
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST}:/app/gcp/application_default_credentials.json:ro
    environment:
      - CONFIG_DIR=${CONFIG_DIR}
      - CONFIG_NAME=${CONFIG_NAME}
      - PORT=8001
      - PYTHONPATH=/app
      # Python kodu (agent) tarafından import edilen env var'lar
      - ENV=${ENV}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - AGENT_HEARTBEAT_SECONDS=${AGENT_HEARTBEAT_SECONDS}
      - REDIS_URL=redis://redis:6379
      - VERTEXAI_ENABLED=${VERTEXAI_ENABLED}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp/application_default_credentials.json
    depends_on:
      - redis
    networks:
      - appnet
    command: python -m agent.worker

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    image: krstlcm/orion-api:prod
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ai_config_data:/app/config/shared
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST}:/app/gcp/application_default_credentials.json:ro
    environment:
      - REDIS_URL=redis://redis:6379
      - SOCKETIO_DISTRIBUTED_MODE=true
      - WS_TRANSPORT_WEBSOCKET_ONLY=true
      - WS_MOCK_REPLY_DELAY_SECONDS=0
      - WS_PERSIST_MESSAGES=false
      - WS_EMIT_ACK=false
      - WS_EMIT_LEGACY_MOCK_REPLY=false
      - WS_LIGHTWEIGHT_PAYLOAD=true
      - SOCKETIO_INCOMING_WORKERS=80
      - SOCKETIO_INCOMING_QUEUE_SIZE=20000
      - PYTHONPATH=/app
    depends_on:
      - redis
    networks:
      - appnet
    command: uvicorn api.app.main:app --host 0.0.0.0 --port 8000 --workers 1 --loop uvloop

  admin_panel:
    build:
      context: .
      dockerfile: ./admin_panel/Dockerfile
    image: krstlcm/orion-admin_panel:prod
    container_name: admin_panel
    restart: always
    volumes:
      - ai_config_data:/app/config/shared
    ports:
      - "3000:3000"
    environment:
      - CONFIG_DIR=${CONFIG_DIR}
      - CONFIG_NAME=${CONFIG_NAME}
      # Python kodu (config.settings.admin) tarafından import edilen env var'lar
      - ADMIN_HOST=${ADMIN_HOST}
      - ADMIN_PORT=${ADMIN_PORT}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - API_BACKEND_URL=${API_BACKEND_URL}
      - ENV=${ENV}
    depends_on:
      - api
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  arango_data:
  arango_apps_data:
  redis_data:
  ai_config_data:
