services:
  llm:
    image: ${BASE_IMAGE}
    container_name: ${LLM_HOST}
    restart: unless-stopped
    ports:
      - "${LLM_PORT}:${LLM_CONTAINER_PORT}"
    env_file:
      - ../../.env.global
      - .env
    command: --model /app/models/${MODEL_FILE} --host ${DEFAULT_LISTEN_HOST} --port ${LLM_CONTAINER_PORT} --n-gpu-layers ${GPU_LAYERS} --ctx-size ${CONTEXT_SIZE} --batch-size ${BATCH_SIZE} --parallel ${N_PARALLEL} ${MMPROJ_ARGS} ${EXTRA_ARGS}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT}
              capabilities: [gpu]
    volumes:
      - ./models:/app/models
    networks:
      - orion-network

networks:
  orion-network:
    external: true
    name: ${ORION_NETWORK}
