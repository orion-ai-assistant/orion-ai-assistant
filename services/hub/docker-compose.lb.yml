# Orion Hub - Load Balanced Mod
# docker-compose -f docker-compose.yml -f docker-compose.lb.yml up -d

services:
  api_2:
    build:
      context: ../../
      dockerfile: services/hub/api.Dockerfile
    container_name: ${API_2_HOST}
    restart: unless-stopped
    env_file:
      - ../.env.global
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - orion-network

  nginx:
    image: nginx:1.27-alpine
    container_name: ${NGINX_HOST}
    restart: unless-stopped
    depends_on:
      - api
      - api_2
    ports:
      - "${LB_PORT}:${NGINX_CONTAINER_PORT}"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - orion-network

networks:
  orion-network:
    external: true
    name: ${ORION_NETWORK}
