<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI — Installer Panel</title>
    <link rel="icon" type="image/png" href="/ui/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/ui/style.css?v=1.2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>ORION <span>AI</span></h1>
                <p style="color: var(--text-secondary); font-size: 0.9rem;" data-i18n="ui_subtitle">ui_subtitle</p>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div id="os-badge" class="panel" style="padding: 8px 16px; font-size: 0.8rem; opacity: 0.8;">
                    <i id="os-icon" class="fas fa-laptop-code"></i> <span id="os-text">--</span>
                </div>
                <div id="mode-badge" class="panel" style="padding: 8px 16px; font-size: 0.8rem; opacity: 0.8;">
                    <i id="mode-icon" class="fas fa-server"></i> <span data-i18n="ui_mode">Mode</span>: <span id="mode-text">--</span>
                </div>
                <div class="panel" style="padding: 4px 8px; font-size: 0.8rem;">
                    <select id="lang-select" style="background: transparent; border: none; color: var(--text-primary); cursor: pointer; outline: none; font-weight: 600;">
                        <option value="tr">TR</option>
                        <option value="en">EN</option>
                    </select>
                </div>
            </div>
        </header>

        <section class="hw-card panel">
            <div class="hw-item">
                <span class="hw-label" data-i18n="ui_hw_cpu">ui_hw_cpu</span>
                <span id="hw-cpu-name" class="hw-value">--</span>
            </div>
            <div class="hw-item hw-item-right">
                <span class="hw-label" data-i18n="ui_hw_gpu">ui_hw_gpu</span>
                <span id="hw-gpu-name" class="hw-value">--</span>
            </div>
            <div class="hw-item">
                <span class="hw-label" data-i18n="ui_hw_vram">ui_hw_vram</span>
                <span id="hw-vram-gb" class="hw-value">--</span>
            </div>
        </section>

        <section class="wizard panel">
            <div class="wizard-header">
                <div class="wizard-title">
                    <h2 id="wizard-title">ui_step_1_title</h2>
                    <p id="wizard-subtitle">ui_step_1_sub</p>
                </div>
                <div id="wizard-steps" class="wizard-steps"></div>
                <div class="wizard-actions">
                    <button id="btn-step-back" class="btn btn-ghost" data-i18n="ui_btn_back">ui_btn_back</button>
                    <button id="btn-step-next" class="btn btn-primary" data-i18n="ui_btn_next">ui_btn_next</button>
                </div>
            </div>
        </section>



        <div id="services-grid" class="grid">
            <!-- Servis kartları buraya gelecek -->
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="completion-panel" class="completion-overlay hidden" role="dialog" aria-modal="true"
        aria-labelledby="completion-title">
        <div class="completion-card panel">
            <div class="completion-head">
                <h3 id="completion-title" data-i18n="ui_completion_title">ui_completion_title</h3>
                <button id="btn-close-completion" class="btn btn-ghost btn-small" type="button" data-i18n="ui_btn_close">ui_btn_close</button>
            </div>
            <p class="completion-subtitle" data-i18n="ui_completion_subtitle">ui_completion_subtitle</p>
            <div id="completion-summary" class="completion-summary"></div>
            <div id="completion-status-list" class="completion-status-list"></div>
        </div>
    </div>

    <!-- Custom Confirmation Modal -->
    <div id="confirm-modal" class="completion-overlay hidden" role="dialog" aria-modal="true">
        <div class="confirm-card panel">
            <div class="confirm-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 id="confirm-modal-title" class="confirm-title" data-i18n="confirm_delete_title">confirm_delete_title</h3>
            <p id="confirm-modal-message" class="confirm-message" data-i18n="confirm_delete_msg">confirm_delete_msg</p>
            <div class="confirm-actions">
                <button id="confirm-modal-no" class="btn btn-ghost" data-i18n="confirm_btn_no">confirm_btn_no</button>
                <button id="confirm-modal-yes" class="btn btn-danger" data-i18n="confirm_btn_yes">confirm_btn_yes</button>
            </div>
        </div>
    </div>

    <script src="/ui/js/locales/tr.js"></script>
    <script src="/ui/js/locales/en.js"></script>
    <script src="/ui/js/i18n.js"></script>
    <script type="module" src="/ui/app.js?v=1.3"></script>
</body>

</html>
